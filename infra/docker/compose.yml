version: '3.8'

services:
  # TypeScript orchestrator - local coordinator for run lifecycle and event routing
  orchestrator:
    build:
      context: ../../
      dockerfile: infra/docker/orchestrator.Dockerfile
    container_name: avasim-orchestrator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=avasim
      - POSTGRES_USER=avasim
      - POSTGRES_PASSWORD=avasim_dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RULES_ENGINE_URL=http://rules-engine:8080
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - avasim-network

  # Rust rules engine - deterministic simulation core
  rules-engine:
    build:
      context: ../../
      dockerfile: infra/docker/rules-engine.Dockerfile
    container_name: avasim-rules-engine
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - avasim-network

  # Python simulation worker - batch orchestration and analytics
  sim-worker:
    build:
      context: ../../
      dockerfile: infra/docker/sim-worker.Dockerfile
    container_name: avasim-sim-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RULES_ENGINE_URL=http://rules-engine:8080
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - avasim-network

  # PostgreSQL - persistent local data (scenarios, builds, runs)
  postgres:
    image: postgres:16-alpine
    container_name: avasim-postgres
    environment:
      - POSTGRES_DB=avasim
      - POSTGRES_USER=avasim
      - POSTGRES_PASSWORD=avasim_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avasim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avasim-network

  # Redis - local queue and ephemeral run-state cache
  redis:
    image: redis:7-alpine
    container_name: avasim-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avasim-network

  # MinIO - object storage for run artifacts, replays, reports
  minio:
    image: minio/minio:latest
    container_name: avasim-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avasim-network

networks:
  avasim-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
